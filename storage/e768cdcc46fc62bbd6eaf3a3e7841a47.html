  function findWrapper() {
    return (
      document.querySelector(".academy-search-bar-wrapper.AL_Custom_NavSearchBar") ||
      document.querySelector(".academy-search-bar-wrapper") ||
      document.querySelector("[class*='search-bar-wrapper'][class*='AL_Custom_NavSearchBar']")
    );
  }

  function waitForWrapper(cb) {
    var el = findWrapper();
    if (el) return cb(el);

    var obs = new MutationObserver(function () {
      var el2 = findWrapper();
      if (el2) { obs.disconnect(); cb(el2); }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }

  function loadCss(urls, i, done) {
    if (i >= urls.length) return done(false);
    var href = urls[i];
    if (document.querySelector('link[href="' + href + '"]')) return done(true);

    var l = document.createElement("link");
    l.rel = "stylesheet";
    l.href = href;
    l.onload = function () { done(true); };
    l.onerror = function () { loadCss(urls, i + 1, done); };
    document.head.appendChild(l);
  }

  function loadJs(urls, i, done) {
    if (i >= urls.length) return done(false);
    var src = urls[i];
    if (document.querySelector('script[src="' + src + '"]')) return done(true);

    var s = document.createElement("script");
    s.src = src;
    s.async = true;
    s.onload = function () { done(true); };
    s.onerror = function () { loadJs(urls, i + 1, done); };
    document.head.appendChild(s);
  }

  loadCss(CSS_URLS, 0, function (cssOk) {
    if (!cssOk) console.warn("[AcademySearchWidget] CSS failed from all paths");

    loadJs(JS_URLS, 0, function (jsOk) {
      if (!jsOk) {
        console.error("[AcademySearchWidget] JS failed from all paths");
        return;
      }

      waitForWrapper(function (wrapper) {
        wrapper.innerHTML = '<div id="academy-search-widget"></div>';

          }
        } catch (e) {}

          "#academy-search-widget",
          {
            appId: "9W4KTRX803",
            apiKey: "cf1e5788cbc43a52d6268b9f888da03a",
            indexName: "AcademyContent_WorkRamp",
            querySuggestionsIndexName: "AcademyContent_WorkRamp_query_suggestions",

wrapper.classList.add("widget-ready");
