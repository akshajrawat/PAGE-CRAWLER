services:
  # ----------------------------------------
  # SERVICE 1: The Queue/Message Broker
  # ----------------------------------------
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    # This prevents Redis from saving to disk, keeping it blazing fast for queues
    command: redis-server --save "" --appendonly no 

  # ----------------------------------------
  # SERVICE 2: The API (Frontend facing)
  # ----------------------------------------
  api:
    build: . 
    container_name: moxcety-api
    command: npx ts-node src/apps/api/server.ts 
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - SUPABASE_URL=http://host.docker.internal:54321

  # ----------------------------------------
  # SERVICE 3: The Fetch Worker
  # ----------------------------------------
  worker-fetch:
    build: .
    container_name: moxcety-fetch-worker
    command: npx ts-node src/apps/worker-fetch/index.ts 
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - SUPABASE_URL=http://host.docker.internal:54321

  # ----------------------------------------
  # SERVICE 4: The Parse Worker
  # ----------------------------------------
  worker-parse:
    build: .
    container_name: moxcety-parse-worker
    command: npx ts-node src/apps/worker-parse/index.ts 
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - SUPABASE_URL=http://host.docker.internal:54321